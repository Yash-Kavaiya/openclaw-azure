# ============================================================
# GitHub Actions - Application Build & Deploy Pipeline
# ============================================================

name: "Build & Deploy"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "Dockerfile"

permissions:
  id-token: write
  contents: read
  packages: write
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: openclaw

jobs:
  # ============================================================
  # Job 1: Lint & Test
  # ============================================================
  test:
    name: "Test"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openclaw
          POSTGRES_PASSWORD: openclaw
          POSTGRES_DB: openclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://openclaw:openclaw@localhost:5432/openclaw
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "app/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio pytest-cov httpx
          pip install -r app/requirements.txt

      - name: Lint with Ruff
        run: ruff check app/ --output-format=github

      - name: Run tests
        run: |
          cd app
          python -m pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: app/coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/test-results.xml

  # ============================================================
  # Job 2: Container Scan
  # ============================================================
  scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ============================================================
  # Job 3: Build & Push to ACR
  # ============================================================
  build-push:
    name: "Build & Push"
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-full: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop-latest,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

  # ============================================================
  # Job 4: Deploy to Dev
  # ============================================================
  deploy-dev:
    name: "Deploy Dev"
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/develop'
    environment:
      name: dev
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Rolling deploy to Dev VMs
        run: |
          RG="${{ secrets.DEV_RESOURCE_GROUP }}"
          IMAGE="${{ needs.build-push.outputs.image-full }}"

          echo "Deploying image: $IMAGE"

          VMS=$(az vm list -g $RG --query "[].name" -o tsv)

          for VM in $VMS; do
            echo "Deploying to $VM..."
            az vm run-command invoke \
              -g $RG -n $VM \
              --command-id RunShellScript \
              --scripts "
                set -e
                az acr login --name ${{ secrets.ACR_NAME }}
                docker pull $IMAGE
                docker stop openclaw 2>/dev/null || true
                docker rm openclaw 2>/dev/null || true
                docker run -d --name openclaw --restart always \
                  --env-file /etc/openclaw/environment \
                  -p 8000:8000 \
                  $IMAGE
                sleep 10
                curl -f http://localhost:8000/api/health
              "
            echo "✓ Deployed to $VM"
          done

      - name: Get app URL
        id: get-url
        run: |
          VM_IP=$(az vm list-ip-addresses -g ${{ secrets.DEV_RESOURCE_GROUP }} \
            --query "[0].virtualMachine.network.publicIpAddresses[0].ipAddress" -o tsv)
          echo "url=http://$VM_IP" >> $GITHUB_OUTPUT

      - name: Smoke test Dev
        run: |
          URL="${{ steps.get-url.outputs.url }}"
          echo "Testing: $URL/api/health"
          for i in {1..5}; do
            curl -f "$URL/api/health" && break
            echo "Retry $i/5..."
            sleep 10
          done

  # ============================================================
  # Job 5: Deploy to Prod (requires manual approval)
  # ============================================================
  deploy-prod:
    name: "Deploy Prod"
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod        # Must have required reviewers configured
      url: https://openclaw.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Blue-Green deploy to Prod
        run: |
          RG="${{ secrets.PROD_RESOURCE_GROUP }}"
          IMAGE="${{ needs.build-push.outputs.image-full }}"
          TAG="${{ needs.build-push.outputs.image-tag }}"

          echo "Deploying $IMAGE to production ($RG)"

          VMS=$(az vm list -g $RG --query "[].name" -o tsv)
          VM_COUNT=$(echo "$VMS" | wc -l)
          IDX=1

          for VM in $VMS; do
            echo "[$IDX/$VM_COUNT] Deploying to $VM..."

            az vm run-command invoke \
              -g $RG -n $VM \
              --command-id RunShellScript \
              --scripts "
                set -e
                az acr login --name ${{ secrets.ACR_NAME }}
                docker pull $IMAGE

                # Blue-green: start new, health check, remove old
                docker run -d --name openclaw-new \
                  --env-file /etc/openclaw/environment \
                  -p 8001:8000 $IMAGE

                sleep 15
                curl -f http://localhost:8001/api/health || {
                  docker stop openclaw-new
                  docker rm openclaw-new
                  echo 'Health check failed, rolling back'
                  exit 1
                }

                # Swap ports: stop old, redirect nginx to new
                docker stop openclaw 2>/dev/null || true
                docker rm openclaw 2>/dev/null || true
                docker run -d --name openclaw --restart always \
                  --env-file /etc/openclaw/environment \
                  -p 8000:8000 $IMAGE
                docker stop openclaw-new
                docker rm openclaw-new

                curl -f http://localhost:8000/api/health
                echo 'Deployment successful'
              "

            echo "✓ [$IDX/$VM_COUNT] $VM deployed"
            IDX=$((IDX + 1))
          done

      - name: Production smoke tests
        run: |
          URL="https://openclaw.example.com"
          curl -f "$URL/api/health" || exit 1
          curl -f "$URL/api/health/detailed" || exit 1
          echo "Production deployment verified!"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v${{ github.run_number }}"
          release_name: "Release v${{ github.run_number }}"
          body: |
            ## Changes
            - Build: ${{ github.sha }}
            - Image: ${{ needs.build-push.outputs.image-full }}
            - Deployed to production
          draft: false
          prerelease: false

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Production Deployment Failed - Build #${{ github.run_number }}`,
              body: `Deployment failed for commit ${{ github.sha }}\n\nWorkflow: ${{ github.workflow }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['bug', 'deployment']
            })
